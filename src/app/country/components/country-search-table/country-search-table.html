<section class="mt-5">
  <div class="overflow-x-auto">
    <table class="table table-xs">
      <thead>
        <tr>
          <th>#</th>
          <th>Icon</th>
          <th>Flag</th>
          <th>Name</th>
          <th>Capital</th>
          <th>Population</th>
        </tr>
      </thead>
      <tbody>
        @for (country of countries(); track country.cca2; let index = $index) {
          <tr>
            <th>{{index + 1}}</th>
            <td>{{country.flag}}</td>
            <td>
              <img [src]="country.flags.svg" [alt]="country.cca2" class="w-10">
            </td>
            <td>{{country.name.official}}</td>
            <td>{{country.capital}}</td>
            <td>{{country.population}}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
