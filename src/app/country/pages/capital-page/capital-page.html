<country-search-input (capital)="query.set($event)" placeholderMessage="capital" [initialValue]="this.query()" />
<country-search-table
  [countries]="countryResource.value() ?? []"
  [errorMessage]="countryResource.error()?.message"
  [isLoading]="countryResource.isLoading()"
  [isEmpty]="countryResource.value()?.length === 0"
/>
