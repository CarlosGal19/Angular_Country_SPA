<country-search-input (capital)="query.set($event)" placeholderMessage="name"/>

<country-search-table
  [countries]="countryNameResource.value() ?? []"
  [errorMessage]="countryNameResource.error()?.message"
  [isLoading]="countryNameResource.isLoading()"
  [isEmpty]="countryNameResource.value()?.length === 0"
/>
