<div class="flex flex-row gap-2 mt-2">
  <input
    type="text"
    class="input input-bordered mr-2 w-56"
    [placeholder]="'Search by ' + placeholderMessage()"
    autofocus
    (keyup.enter)="getCapital(inCapital.value)"
    (keyup)="inputValue.set(inCapital.value)"
    #inCapital
    [value]="this.inputValue()"
  >
  <button
    class="btn btn-primary"
    (click)="getCapital(inCapital.value)"
  >Search</button>

</div>
